# App version, configurable by environment variable
app.version=${APP_VERSION:unknown}
quarkus.http.auth.form.http-only-cookie=false
quarkus.banner.path=banner.txt

# Jackson configuration - exclude null fields from JSON responses
quarkus.jackson.serialization-inclusion=non-null

app.tld.service=qmusic
app.domain=http://localhost:8080/music/tdl
auth-api-tdl/mp-rest/url=https://auth.${app.tld.service}.com
tdl-api/mp-rest/url=https://api.${app.tld.service}hifi.com
tdl.origin.header=http://listen.${app.tld.service}.com
tdl.country.code=AR
tdl.cover.url=https://resources.${app.tld.service}.com/images/%s/640x640.jpg

tdl.client.id=
tdl.refresh.token=
quarkus.log.category."org.jboss.resteasy.reactive.server.handlers".level=OFF
