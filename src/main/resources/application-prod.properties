# mongodb
%prod.quarkus.mongodb.database=${MONGODB_DATABASE}
%prod.quarkus.mongodb.connection-string=${MONGODB_CONNECTION_STRING}
# cors
%prod.quarkus.http.cors=true
%prod.quarkus.http.cors.origins=${CORS_ORIGINS}
%prod.quarkus.http.cors.access-control-allow-credentials=true
%prod.quarkus.http.cors.headers=accept,authorization,content-type
%prod.quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
# jwk authentication
%prod.smallrye.jwt.verify.key-format=JWK
%prod.smallrye.jwt.verify.algorithm=HS256
%prod.smallrye.jwt.verify.key.location=file:///work/secret.jwk

# TDL configuration for production
tdl.master.key=${TDL_MASTER_KEY}
tld.service=${TDL_SERVICE}
tdl.provider.name=${TDL_PROVIDER_NAME}
tdl.refresh.token=${TDL_REFRESH_TOKEN}
tdl.client.id=${TDL_CLIENT_ID}
